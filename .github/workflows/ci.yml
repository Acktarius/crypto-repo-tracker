# Quality checks on every push (any branch). npm audit is advisory only.
name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Biome lint
        run: npm run lint

      - name: Biome format (check)
        run: npm run format

      - name: Biome check
        run: npm run check

      - name: npm audit (non-blocking)
        continue-on-error: true
        run: npm audit
